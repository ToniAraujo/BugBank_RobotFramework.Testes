name: Robot Framework Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg unzip curl
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt install -y ./google-chrome-stable_current_amd64.deb
          google-chrome --version

      - name: Instalar ChromeDriver compatível
        run: |
          CHROME_VERSION=$(google-chrome --version | awk '{print $3}' | cut -d '.' -f 1)
          CHROMEDRIVER_VERSION=$(curl -s "https://chromedriver.storage.googleapis.com/LATEST_RELEASE_$CHROME_VERSION")
          wget https://chromedriver.storage.googleapis.com/$CHROMEDRIVER_VERSION/chromedriver_linux64.zip
          unzip chromedriver_linux64.zip
          sudo mv chromedriver /usr/local/bin/
          chromedriver --version

      - name: Verificar instalação das bibliotecas
        run: |
          python -c "import robot; print(f'Robot Framework: {robot.__version__}')"
          python -c "import SeleniumLibrary; print('SeleniumLibrary: OK')"
          python -c "import webdriver_manager; print('webdriver-manager: OK')"

      - name: Ativar modo headless para CI/CD
        run: |
          FILE="robot-framework/Resources/Variables/loginVariables.robot"
          sed -i 's/^# \(\${CHROME_OPTIONS}.*headless.*\)/\1/' "$FILE"
          echo "✓ Modo headless ativado na pipeline"
          cat "$FILE" | grep -A 2 "CHROME_OPTIONS"

      - name: Executar testes Robot em headless
        run: python -m robot -d results "robot-framework/tests"

      - name: Publicar resultados como artefatos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: results