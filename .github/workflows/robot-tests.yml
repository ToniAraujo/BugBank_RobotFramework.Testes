name: Robot Framework Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar Chrome e ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          # Verificar instalação
          chromium-browser --version
          chromedriver --version

      - name: Verificar instalação das bibliotecas
        run: |
          python -c "import robot; print(f'Robot Framework: {robot.__version__}')"
          python -c "import SeleniumLibrary; print('SeleniumLibrary: OK')"
          python -c "import webdriver_manager; print('webdriver-manager: OK')"

      - name: Ativar modo headless para CI/CD
        run: |
          FILE="robot-framework/Resources/Variables/loginVariables.robot"
          # Comenta a linha vazia do CHROME_OPTIONS
          sed -i 's/^\${CHROME_OPTIONS}\s*$/# \${CHROME_OPTIONS}/' "$FILE"
          # Descomenta a linha headless
          sed -i 's/^# \(\${CHROME_OPTIONS}\)/\${CHROME_OPTIONS}/' "$FILE"
          echo "✓ Modo headless ativado na pipeline"
          cat "$FILE" | grep -A 2 "CHROME_OPTIONS"

      - name: Executar testes Robot em headless
        run: python -m robot -d results "robot-framework/tests"

      - name: Publicar resultados como artefatos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: results