name: Robot Framework Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar Chrome e ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          # Verificar instalação
          chromium-browser --version
          chromedriver --version

      - name: Verificar instalação das bibliotecas
        run: |
          python -c "import robot; print(f'Robot Framework: {robot.__version__}')"
          python -c "import SeleniumLibrary; print('SeleniumLibrary: OK')"
          python -c "import webdriver_manager; print('webdriver-manager: OK')"

      - name: Ativar modo headless para CI/CD
        run: |
          python << 'EOF'
import re
with open('robot-framework/Resources/Variables/loginVariables.robot', 'r', encoding='utf-8') as f:
    content = f.read()

# Comentar a linha vazia
content = content.replace('${CHROME_OPTIONS}                \n', '# ${CHROME_OPTIONS}                \n')
# Descomentar a linha headless
content = content.replace('# ${CHROME_OPTIONS}                add_argument(', '${CHROME_OPTIONS}                add_argument(')

with open('robot-framework/Resources/Variables/loginVariables.robot', 'w', encoding='utf-8') as f:
    f.write(content)
print('✓ Headless ativado para pipeline CI/CD')
EOF

      - name: Executar testes Robot em headless
        run: python -m robot -d results "robot-framework/tests"

      - name: Publicar resultados como artefatos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: results